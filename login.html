<!DOCTYPE html><html lang="az"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daxil Ol — AN Psixoloji</title>
<style>
*{box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
body{margin:0;background:linear-gradient(135deg,#6A0000,#8a2020);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:40px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
h1{color:#6A0000;margin:0 0 8px;font-size:24px}
.sub{color:#777;font-size:13px;margin-bottom:24px}
.tabs{display:flex;gap:10px;margin-bottom:20px}
.tab{flex:1;padding:10px;text-align:center;border:2px solid #ddd;border-radius:8px;cursor:pointer;font-weight:600;color:#777;transition:.2s}
.tab.active{border-color:#6A0000;color:#6A0000;background:#f5f5f5}
label{display:block;font-size:13px;color:#555;margin-bottom:6px;margin-top:14px;font-weight:600}
input{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;margin-bottom:0}
button{width:100%;padding:13px;margin-top:20px;border:none;border-radius:10px;background:#6A0000;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
button:hover{background:#8a2020}
.msg{margin-top:12px;font-size:13px;text-align:center;padding:10px;border-radius:8px}
.msg.ok{background:#e8f5e9;color:#27ae60}
.msg.err{background:#fdecea;color:#c0392b}
.login-link{margin-top:16px;text-align:center;font-size:13px;color:#777}
.login-link a{color:#6A0000;text-decoration:none;font-weight:600}
.hidden{display:none}
</style></head><body>
<div class="card">
<h1>🔐 Daxil Ol</h1>
<div class="sub">AN Psixoloji Qiymətləndirmə Alətləri</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('customer')">Müştəri</div>
<div class="tab" onclick="switchTab('admin')">Admin</div>
</div>

<!-- Müştəri -->
<div id="customer-tab">
<label>E-poçt</label>
<input type="email" id="customer-email" placeholder="məsən@merkez.com">

<button onclick="loginCustomer()">Daxil Ol</button>
<div class="msg" id="customer-msg"></div>

<div class="login-link">
Hələ qeydiyyat keçməmisiniz? <a href="qeydiyyat.html">Qeydiyyatdan Keç</a>
</div>
</div>

<!-- Admin -->
<div id="admin-tab" class="hidden">
<label>Admin Şifrəsi</label>
<input type="password" id="admin-password" placeholder="Şifrə daxil edin">

<button onclick="loginAdmin()">Admin Panel</button>
<div class="msg" id="admin-msg"></div>
</div>
</div>

<script>
const ADMIN_PASSWORD = "AN2026EA";

function switchTab(tab){
  document.getElementById('customer-tab').classList.toggle('hidden', tab !== 'customer');
  document.getElementById('admin-tab').classList.toggle('hidden', tab !== 'admin');
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && tab === 'customer') || (i === 1 && tab === 'admin'));
  });
}

function loginCustomer(){
  const email = document.getElementById('customer-email').value.trim();
  const msg = document.getElementById('customer-msg');
  
  if (!email) {
    msg.className = 'msg err';
    msg.textContent = 'E-poçt daxil edin';
    return;
  }
  
  let customers = JSON.parse(localStorage.getItem('customers') || '{}');
  
  if (!customers[email]) {
    msg.className = 'msg err';
    msg.textContent = 'Bu e-poçt tapılmadı';
    return;
  }
  
  if (!customers[email].approved) {
    msg.className = 'msg err';
    msg.textContent = 'Admin tərəfindən hələ təsdiqlənməmisiniz';
    return;
  }
  
  localStorage.setItem('currentUser', email);
  msg.className = 'msg ok';
  msg.textContent = '✓ Giriş uğurlu!';
  
  setTimeout(() => {
    window.location.href = 'index.html';
  }, 1000);
}

function loginAdmin(){
  const password = document.getElementById('admin-password').value;
  const msg = document.getElementById('admin-msg');
  
  if (password !== ADMIN_PASSWORD) {
    msg.className = 'msg err';
    msg.textContent = 'Şifrə yanlışdır';
    return;
  }
  
  localStorage.setItem('isAdmin', 'true');
  msg.className = 'msg ok';
  msg.textContent = '✓ Admin panelə keçilir...';
  
  setTimeout(() => {
    window.location.href = 'admin-panel.html';
  }, 1000);
}

document.getElementById('customer-email').addEventListener('keydown', function(e){
  if (e.key === 'Enter') loginCustomer();
});

document.getElementById('admin-password').addEventListener('keydown', function(e){
  if (e.key === 'Enter') loginAdmin();
});
</script>
</body></html>
