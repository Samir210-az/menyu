<!DOCTYPE html><html lang="az"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — AN Psixoloji</title>
<style>
*{box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
body{margin:0;background:#f6f1ec;color:#2a1414;padding:20px}
.wrap{max-width:1000px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
h1{color:#6A0000;margin:0;font-size:24px}
.logout{background:#6A0000;color:#fff;padding:10px 16px;border-radius:8px;border:none;cursor:pointer}
.logout:hover{background:#8a2020}
.tabs{display:flex;gap:10px;margin-bottom:20px}
.tab{padding:10px 16px;border:2px solid #ddd;border-radius:8px;cursor:pointer;font-weight:600;color:#777;transition:.2s}
.tab.active{border-color:#6A0000;color:#6A0000;background:#f5f5f5}
.card{background:#fff;border-radius:14px;padding:22px;margin-bottom:20px;box-shadow:0 4px 16px rgba(0,0,0,.06)}
.card h3{margin:0 0 14px;font-size:16px;color:#6A0000}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 6px;border-bottom:1px solid #eee;text-align:left}
th{background:#f5f5f5;font-weight:600;color:#6A0000}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;background:#fdecea;color:#c0392b}
.badge.active{background:#e8f5e9;color:#27ae60}
.actions{display:flex;gap:6px}
button.action-btn{padding:6px 10px;border:none;border-radius:6px;font-size:12px;cursor:pointer}
.btn-approve{background:#27ae60;color:#fff}
.btn-approve:hover{background:#229954}
.btn-license{background:#2980b9;color:#fff}
.btn-license:hover{background:#1e5e8c}
.btn-delete{background:#e74c3c;color:#fff}
.btn-delete:hover{background:#c0392b}
.hidden{display:none}
.license-select{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.license-checkbox{display:flex;align-items:center}
.license-checkbox input{width:16px;height:16px;cursor:pointer}
.license-checkbox label{margin:0 0 0 6px;font-size:13px;cursor:pointer}
.repo-group{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #eee}
.repo-name{font-weight:600;color:#6A0000;font-size:14px;margin-bottom:8px}
.search{margin-bottom:16px}
.search input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.stat-row{display:flex;gap:20px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #eee}
.stat-item{flex:1}
.stat-label{font-size:12px;color:#777;margin-bottom:4px}
.stat-value{font-size:16px;font-weight:600;color:#6A0000}
</style></head><body>
<div class="wrap">
<div class="header">
<h1>🛡️ Admin Panel</h1>
<button class="logout" onclick="logout()">Çıxış</button>
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('customers')">Müştərilər</div>
<div class="tab" onclick="switchTab('usage')">İstifadə Edən Testlər</div>
</div>

<!-- Müştərilər Tab -->
<div id="customers-tab">
<div class="card">
<h3>Qeydiyyat Etmiş Müştərilər</h3>
<div style="margin-bottom:12px">
<button style="background:#444;padding:10px 16px;border:none;border-radius:8px;color:#fff;cursor:pointer;font-weight:600" onclick="loadAllCustomers()">🔄 GitHub-dan Yüklə</button>
</div>
<div class="search">
<input type="text" id="searchInput" placeholder="Mərkəz adı ilə axtar..." onkeyup="filterCustomers()">
</div>
<table>
<thead><tr><th>Mərkəzin Adı</th><th>E-poçt</th><th>Telefon</th><th>Status</th><th>Lisenziyalar</th><th>Fəaliyyət</th></tr></thead>
<tbody id="customersTable"></tbody>
</table>
</div>
</div>

<!-- İstifadə Edən Testlər Tab -->
<div id="usage-tab" class="hidden">
<div class="card">
<h3>Hansı Merkez Hansı Testi İstifadə Edir</h3>
<div id="usageTable"></div>
</div>
</div>
</div>

<!-- Modal: Lisenziya Ver -->
<div id="licenseModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px">
<div style="background:#fff;border-radius:12px;padding:24px;max-width:500px;width:100%">
<h3 style="color:#6A0000;margin:0 0 16px">Lisenziya Seç</h3>
<div id="licenseContent"></div>
<div style="display:flex;gap:10px;margin-top:20px">
<button style="flex:1;padding:10px;border:none;border-radius:8px;background:#ddd;cursor:pointer" onclick="closeModal()">Bağla</button>
<button style="flex:1;padding:10px;border:none;border-radius:8px;background:#6A0000;color:#fff;cursor:pointer" onclick="saveLicense()">Saxla</button>
</div>
</div>
</div>

<script src="https://samir210-az.github.io/menyu/customers-data.js"></script>
<script>
const REPOS = {
  "aba-terapiya": { name:"ABA Terapiya", tools:["vb-mapp","ablls-r","afls","fba","vineland","peak"] },
  "AN": { name:"TTAP", tools:["ttap"] },
  "goog": { name:"Denver II", tools:["denver"] },
  "denever": { name:"Denver Arxiv", tools:["denever-arxiv"] },
  "TEST": { name:"Erkən İnkişaf", tools:["test-erken"] },
  "cbt": { name:"CBT", tools:["cbt"] }
};

let currentEditEmail = null;
let allCustomers = {};

function checkAdmin(){
  if (localStorage.getItem('isAdmin') !== 'true') {
    window.location.href = 'login.html';
    return false;
  }
  return true;
}

function logout(){
  localStorage.removeItem('isAdmin');
  window.location.href = 'login.html';
}

function switchTab(tab){
  document.getElementById('customers-tab').classList.toggle('hidden', tab !== 'customers');
  document.getElementById('usage-tab').classList.toggle('hidden', tab !== 'usage');
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && tab === 'customers') || (i === 1 && tab === 'usage'));
  });
  
  if (tab === 'usage') loadUsageReport();
}

async function loadAllCustomers(){
  try {
    // GitHub-dan oxu
    const res = await fetch('https://raw.githubusercontent.com/Samir210-az/menyu/main/customers-data.js');
    const text = await res.text();
    
    // window.CUSTOMERS_DB-ni çıxart
    const match = text.match(/window\.CUSTOMERS_DB\s*=\s*(\{[\s\S]*\});?\s*$/m);
    if (match) {
      allCustomers = eval('(' + match[1] + ')');
    } else {
      allCustomers = {};
    }
    
    renderCustomers();
  } catch(e) {
    alert('GitHub-dan yükləmə alınmadı: ' + e.message);
  }
}

function renderCustomers(){
  const tbody = document.getElementById('customersTable');
  tbody.innerHTML = '';
  
  Object.entries(allCustomers).forEach(([email, data]) => {
    const licensedRepos = Object.keys(data.licenses).filter(r => data.licenses[r].length > 0);
    const statusBadge = `<span class="badge ${data.approved ? 'active' : ''}">${data.approved ? '✓ Təsdiqləndi' : '⏳ Gözləyən'}</span>`;
    
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><strong>${data.name}</strong></td>
      <td>${email}</td>
      <td>${data.phone}</td>
      <td>${statusBadge}</td>
      <td>${licensedRepos.length > 0 ? licensedRepos.length + ' repo' : 'Yoxdur'}</td>
      <td>
        <div class="actions">
          ${!data.approved ? `<button class="action-btn btn-approve" onclick="approveCustomer('${email}')">Təsdiq Et</button>` : ''}
          <button class="action-btn btn-license" onclick="editLicense('${email}')">Lisenziya</button>
          <button class="action-btn btn-delete" onclick="deleteCustomer('${email}')">Sil</button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function approveCustomer(email){
  if (!confirm(`"${allCustomers[email].name}" təsdiqlənsin?`)) return;
  allCustomers[email].approved = true;
  saveCustomers();
  renderCustomers();
}

function deleteCustomer(email){
  if (!confirm(`"${allCustomers[email].name}" silinsin?`)) return;
  delete allCustomers[email];
  saveCustomers();
  renderCustomers();
}

function editLicense(email){
  currentEditEmail = email;
  const data = allCustomers[email];
  let html = `<p style="margin:0 0 12px;color:#555"><strong>${data.name}</strong></p>`;
  
  Object.entries(REPOS).forEach(([repoId, repo]) => {
    html += `<div class="repo-group">
      <div class="repo-name">${repo.name}</div>
      <div class="license-select">`;
    
    repo.tools.forEach(tool => {
      const checked = data.licenses[repoId].includes(tool) ? 'checked' : '';
      html += `<div class="license-checkbox">
        <input type="checkbox" id="tool-${tool}" ${checked}>
        <label for="tool-${tool}">${tool}</label>
      </div>`;
    });
    
    html += `</div></div>`;
  });
  
  document.getElementById('licenseContent').innerHTML = html;
  document.getElementById('licenseModal').style.display = 'flex';
}

function saveLicense(){
  const email = currentEditEmail;
  const data = allCustomers[email];
  
  Object.keys(data.licenses).forEach(repo => {
    data.licenses[repo] = [];
  });
  
  document.querySelectorAll('.license-checkbox input:checked').forEach(input => {
    const toolId = input.id.replace('tool-', '');
    Object.keys(REPOS).forEach(repo => {
      if (REPOS[repo].tools.includes(toolId)) {
        data.licenses[repo].push(toolId);
      }
    });
  });
  
  saveCustomers();
  renderCustomers();
  closeModal();
}

function closeModal(){
  document.getElementById('licenseModal').style.display = 'none';
}

function filterCustomers(){
  const query = document.getElementById('searchInput').value.toLowerCase();
  const rows = document.querySelectorAll('#customersTable tr');
  rows.forEach(row => {
    const name = row.cells[0].textContent.toLowerCase();
    row.style.display = name.includes(query) ? '' : 'none';
  });
}

function loadUsageReport(){
  let html = '';
  
  Object.entries(allCustomers).forEach(([email, data]) => {
    if (!data.approved) return;
    
    let hasLicense = false;
    let usageHtml = `<div class="stat-row"><strong>${data.name}</strong></div>`;
    
    Object.entries(REPOS).forEach(([repoId, repo]) => {
      if (data.licenses[repoId].length > 0) {
        hasLicense = true;
        usageHtml += `<div class="stat-row">
          <div><strong>${repo.name}:</strong> ${data.licenses[repoId].join(', ')}</div>
        </div>`;
      }
    });
    
    if (hasLicense) {
      html += `<div class="card">${usageHtml}</div>`;
    }
  });
  
  if (!html) html = '<div class="card"><p style="color:#777">Hələ hər hansı lisenziya verilməyib</p></div>';
  
  document.getElementById('usageTable').innerHTML = html;
}

function saveCustomers(){
  // localStorage-ə yaz (temp)
  localStorage.setItem('customers', JSON.stringify(allCustomers));
  // GitHub-a yazmalı (sonra)
}

if (checkAdmin()) {
  loadAllCustomers();
}
</script>
</body></html>
