<html lang="az">
<head>
<meta charset="UTF-8">

<style>
/* ============================================================
   DESIGN TOKENS — Premium tier
   ============================================================ */
:root{
  /* Brand palette */
  --c-bg:        #0d0208;
  --c-bg2:       #160510;
  --c-surface:   rgba(255,255,255,0.04);
  --c-surface2:  rgba(255,255,255,0.07);
  --c-border:    rgba(210,165,93,0.18);
  --c-border2:   rgba(210,165,93,0.35);

  /* Gold system */
  --gold-50:  #fdf6e3;
  --gold-100: #f9e8bb;
  --gold-200: #f2cc7a;
  --gold-300: #e6b04a;
  --gold-400: #d2a55d;
  --gold-500: #c4922a;
  --gold-600: #a87520;
  --gold-700: #8b5e14;
  --gold-glow: rgba(210,165,93,0.25);
  --gold-glow2:rgba(210,165,93,0.08);

  /* Bordo system */
  --bordo-900: #0d0208;
  --bordo-800: #1a0410;
  --bordo-700: #2e0618;
  --bordo-600: #4a0020;
  --bordo-500: #6a0000;
  --bordo-400: #8b0000;
  --bordo-300: #b00001;
  --bordo-glow:rgba(106,0,0,0.4);

  /* Typography */
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body:    'Inter', system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', monospace;

  /* Spacing */
  --space-1:4px; --space-2:8px; --space-3:12px;
  --space-4:16px; --space-5:20px; --space-6:24px;
  --space-8:32px; --space-10:40px;

  /* Radius */
  --r-sm:10px; --r-md:16px; --r-lg:22px; --r-xl:28px; --r-full:999px;

  /* Shadows */
  --shadow-sm:   0 2px 8px rgba(0,0,0,0.4);
  --shadow-md:   0 6px 24px rgba(0,0,0,0.5);
  --shadow-lg:   0 16px 48px rgba(0,0,0,0.6);
  --shadow-gold: 0 8px 32px rgba(210,165,93,0.2);
  --shadow-inset:inset 0 1px 0 rgba(255,255,255,0.08);

  /* Transitions */
  --ease-out:  cubic-bezier(0.16,1,0.3,1);
  --ease-back: cubic-bezier(0.34,1.56,0.64,1);
  --t-fast:0.15s; --t-mid:0.28s; --t-slow:0.5s;
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
html,body{min-height:100dvh}
body{
  font-family:var(--font-body);
  background:var(--c-bg);
  color:var(--gold-200);
  display:flex;flex-direction:column;
  padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  overflow-x:hidden;
}

/* ============================================================
   ANIMATED BACKGROUND
   ============================================================ */
.bg-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}
.bg-orb{
  position:absolute;border-radius:50%;filter:blur(80px);
  animation:orb-drift ease-in-out infinite;
}
.bg-orb-1{
  width:60vw;height:60vw;max-width:400px;max-height:400px;
  background:radial-gradient(circle,rgba(106,0,0,0.5),transparent 70%);
  top:-10%;left:-10%;animation-duration:18s;
}
.bg-orb-2{
  width:50vw;height:50vw;max-width:360px;max-height:360px;
  background:radial-gradient(circle,rgba(210,165,93,0.12),transparent 70%);
  bottom:-5%;right:-5%;animation-duration:22s;animation-delay:-8s;
}
.bg-orb-3{
  width:40vw;height:40vw;max-width:280px;max-height:280px;
  background:radial-gradient(circle,rgba(74,0,32,0.4),transparent 70%);
  top:40%;left:50%;animation-duration:26s;animation-delay:-14s;
}
.bg-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(210,165,93,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(210,165,93,0.04) 1px,transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse at center,black 20%,transparent 80%);
}
@keyframes orb-drift{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(5%,8%) scale(1.08);}
  66%{transform:translate(-6%,4%) scale(0.94);}
}

/* ============================================================
   NOISE TEXTURE OVERLAY
   ============================================================ */
body::before{
  content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.4;
}

/* ============================================================
   HEADER
   ============================================================ */
header{
  position:relative;z-index:10;
  text-align:center;
  padding:calc(env(safe-area-inset-top) + 36px) 20px 24px;
  animation:header-in 1s var(--ease-out) both;
}
@keyframes header-in{
  from{opacity:0;transform:translateY(-24px);}
  to{opacity:1;transform:none;}
}

/* Logo */
.logo-wrap{position:relative;width:80px;height:80px;margin:0 auto 16px;}
.logo-ring{
  position:absolute;inset:-6px;border-radius:26px;
  background:conic-gradient(
    from 0deg,
    transparent 0deg,
    var(--gold-400) 60deg,
    transparent 130deg,
    transparent 180deg,
    var(--gold-300) 240deg,
    transparent 310deg,
    transparent 360deg
  );
  animation:ring-spin 8s linear infinite;
  opacity:0.7;
}
.logo-ring::after{
  content:'';position:absolute;inset:2px;border-radius:24px;
  background:var(--c-bg);
}
.logo{
  position:relative;z-index:1;
  width:80px;height:80px;border-radius:22px;
  background:linear-gradient(145deg,
    rgba(210,165,93,0.15) 0%,
    rgba(106,0,0,0.3) 50%,
    rgba(210,165,93,0.08) 100%
  );
  border:1.5px solid var(--c-border2);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:800;font-size:28px;
  color:var(--gold-300);
  box-shadow:var(--shadow-md),var(--shadow-inset),0 0 30px var(--gold-glow);
  backdrop-filter:blur(12px);
  animation:logo-float 5s ease-in-out infinite;
}
.logo-glow-ring{
  position:absolute;inset:-12px;border-radius:32px;z-index:0;
  background:radial-gradient(circle,var(--gold-glow),transparent 65%);
  filter:blur(10px);
  animation:glow-pulse 3s ease-in-out infinite;
}
@keyframes ring-spin{to{transform:rotate(360deg);}}
@keyframes logo-float{
  0%,100%{transform:translateY(0px);}
  50%{transform:translateY(-8px);}
}
@keyframes glow-pulse{
  0%,100%{opacity:0.5;transform:scale(1);}
  50%{opacity:0.9;transform:scale(1.15);}
}

/* Headings */
h1{
  font-family:var(--font-display);
  font-size:clamp(20px,5vw,26px);
  font-weight:800;letter-spacing:2px;
  background:linear-gradient(135deg,var(--gold-200) 0%,var(--gold-400) 40%,var(--gold-200) 70%,var(--gold-300) 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:text-shine 5s linear infinite;
  margin-bottom:6px;
}
@keyframes text-shine{to{background-position:200% center;}}
.sub{
  font-family:var(--font-mono);
  font-size:10.5px;letter-spacing:1px;
  color:rgba(210,165,93,0.45);
  text-transform:uppercase;
}

/* Stats strip */
.stats{
  display:flex;justify-content:center;gap:0;margin-top:18px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--c-border);
  border-radius:var(--r-full);
  padding:2px;
  backdrop-filter:blur(12px);
  width:fit-content;margin-left:auto;margin-right:auto;
  box-shadow:var(--shadow-sm);
}
.stat{
  padding:7px 18px;font-size:11px;font-weight:700;
  color:var(--gold-300);letter-spacing:0.3px;
  border-radius:var(--r-full);
}
.stat span{display:block;font-size:15px;font-weight:800;color:var(--gold-200);line-height:1;}
.stat+.stat{border-left:1px solid var(--c-border);}

/* ============================================================
   MAIN CONTENT
   ============================================================ */
main{
  flex:1;width:100%;max-width:560px;
  margin:0 auto;padding:8px 14px 12px;
  position:relative;z-index:10;
}

/* ============================================================
   SECTION LABEL
   ============================================================ */
.sec{
  font-family:var(--font-mono);
  font-size:10px;font-weight:500;letter-spacing:2px;
  text-transform:uppercase;color:var(--gold-500);
  margin:22px 2px 10px;
  display:flex;align-items:center;gap:10px;
}
.sec .sec-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--gold-400);
  box-shadow:0 0 8px var(--gold-400);
  flex-shrink:0;
  animation:dot-blink 2.5s ease-in-out infinite;
}
.sec::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,rgba(210,165,93,0.25),transparent);
}
@keyframes dot-blink{
  0%,100%{opacity:1;box-shadow:0 0 6px var(--gold-400);}
  50%{opacity:0.4;box-shadow:0 0 2px var(--gold-400);}
}

/* ============================================================
   GRID
   ============================================================ */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}

/* ============================================================
   TILE — glassmorphism
   ============================================================ */
.tile{
  position:relative;overflow:hidden;
  background:linear-gradient(145deg,rgba(255,255,255,0.07) 0%,rgba(255,255,255,0.03) 100%);
  border:1px solid var(--c-border);
  border-radius:var(--r-lg);
  padding:16px 8px 13px;
  text-align:center;text-decoration:none;
  color:var(--gold-200);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:var(--shadow-sm),var(--shadow-inset);
  opacity:0;transform:translateY(20px) scale(0.95);
  animation:tile-rise var(--t-slow) var(--ease-back) forwards;
  transition:transform var(--t-mid) var(--ease-out),box-shadow var(--t-mid) var(--ease-out),border-color var(--t-mid) var(--ease-out),background var(--t-mid) var(--ease-out);
  cursor:pointer;will-change:transform;
}
@keyframes tile-rise{to{opacity:1;transform:translateY(0) scale(1);}}
.tile:active{transform:scale(0.91)!important;box-shadow:var(--shadow-sm)!important;}

/* ── Animasiya növləri ── */
/* 1: Yuxarı sürüş */
.tile[data-anim="lift"]:hover{transform:translateY(-7px) scale(1.04);box-shadow:var(--shadow-md),var(--shadow-gold),var(--shadow-inset);border-color:var(--c-border2);background:linear-gradient(145deg,rgba(210,165,93,0.13),rgba(106,0,0,0.14));}
/* 2: Pulse döyünmə */
.tile[data-anim="pulse"]:hover{animation:tile-pulse 0.6s var(--ease-back) forwards;border-color:var(--c-border2);background:linear-gradient(145deg,rgba(210,165,93,0.13),rgba(106,0,0,0.14));}
@keyframes tile-pulse{0%{transform:scale(1);}30%{transform:scale(1.07);}60%{transform:scale(0.97);}100%{transform:scale(1.03) translateY(-4px);}}
/* 3: Döndər tilt */
.tile[data-anim="tilt"]:hover{transform:perspective(400px) rotateX(-6deg) rotateY(4deg) scale(1.04) translateY(-4px);box-shadow:var(--shadow-md),0 20px 40px rgba(210,165,93,0.15);border-color:var(--c-border2);}
/* 4: Sıxıl-açıl */
.tile[data-anim="squeeze"]:hover{animation:tile-squeeze 0.5s var(--ease-back) forwards;border-color:var(--c-border2);}
@keyframes tile-squeeze{0%{transform:scale(1);}25%{transform:scaleX(0.9) scaleY(1.08);}60%{transform:scaleX(1.05) scaleY(0.96);}100%{transform:scale(1.03) translateY(-5px);}}
/* 5: Parıltı glow */
.tile[data-anim="glow"]:hover{transform:translateY(-5px) scale(1.03);box-shadow:0 0 0 1.5px var(--gold-400),0 0 24px var(--gold-glow),var(--shadow-md);border-color:var(--gold-400);background:linear-gradient(145deg,rgba(210,165,93,0.16),rgba(106,0,0,0.1));}
/* 6: Sola-sağa sallan */
.tile[data-anim="wobble"]:hover{animation:tile-wobble 0.55s var(--ease-out) forwards;border-color:var(--c-border2);}
@keyframes tile-wobble{0%{transform:translateX(0);}20%{transform:translateX(-5px) rotate(-2deg);}40%{transform:translateX(5px) rotate(2deg);}60%{transform:translateX(-3px) rotate(-1deg);}80%{transform:translateX(3px) rotate(1deg);}100%{transform:translateX(0) translateY(-4px)scale(1.03);}}
/* 7: Flip ikon */
.tile[data-anim="flip"]:hover{transform:translateY(-5px) scale(1.03);border-color:var(--c-border2);background:linear-gradient(145deg,rgba(210,165,93,0.13),rgba(106,0,0,0.14));}
.tile[data-anim="flip"]:hover .ic{animation:icon-flip 0.5s var(--ease-back);}
@keyframes icon-flip{0%{transform:rotateY(0);}50%{transform:rotateY(180deg) scale(1.2);}100%{transform:rotateY(360deg) scale(1.1);}}
/* 8: Bounce atıl */
.tile[data-anim="bounce"]:hover{animation:tile-bounce 0.55s var(--ease-back) forwards;border-color:var(--c-border2);}
@keyframes tile-bounce{0%{transform:translateY(0);}30%{transform:translateY(-12px) scale(1.05);}55%{transform:translateY(-3px) scale(0.98);}75%{transform:translateY(-8px) scale(1.03);}90%{transform:translateY(-2px);}100%{transform:translateY(-6px) scale(1.03);}}

/* Shimmer sweep (hamısında) */
.tile::before{
  content:'';position:absolute;top:0;left:-120%;width:55%;height:100%;
  background:linear-gradient(115deg,transparent,rgba(210,165,93,0.13),transparent);
  transform:skewX(-20deg);transition:left 0.55s var(--ease-out);pointer-events:none;
}
.tile:hover::before{left:140%;}

/* Top accent line */
.tile::after{
  content:'';position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(210,165,93,0.4),transparent);
}

/* Particle burst on click */
.tile .burst{
  position:absolute;top:50%;left:50%;
  width:4px;height:4px;border-radius:50%;
  background:var(--gold-300);pointer-events:none;
  transform:translate(-50%,-50%) scale(0);opacity:0;
}
.tile.clicked .burst{animation:burst-out 0.5s ease-out forwards;}
@keyframes burst-out{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
  100%{transform:translate(calc(-50% + var(--bx)),calc(-50% + var(--by))) scale(0.5);opacity:0;}
}

.tile .ic{
  font-size:28px;line-height:1;display:block;margin-bottom:8px;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4));
  transition:transform var(--t-mid) var(--ease-back);
}
.tile:not([data-anim="flip"]):hover .ic{transform:scale(1.15) translateY(-2px);}

.tile .nm{
  font-family:var(--font-body);font-size:10.5px;font-weight:700;
  line-height:1.25;color:var(--gold-200);letter-spacing:0.1px;
}

/* ============================================================
   INSTALL BTN
   ============================================================ */
#install{
  display:none;
  margin:20px auto 4px;
  padding:12px 28px;cursor:pointer;
  background:linear-gradient(135deg,var(--gold-400),var(--gold-300));
  color:var(--c-bg);
  border:none;border-radius:var(--r-full);
  font-size:13px;font-weight:800;
  font-family:var(--font-body);
  letter-spacing:0.3px;
  box-shadow:0 4px 20px var(--gold-glow);
  transition:transform var(--t-fast),box-shadow var(--t-fast);
}
#install:active{transform:scale(0.96);}

/* ============================================================
   FOOTER
   ============================================================ */
footer{
  position:relative;z-index:10;
  text-align:center;
  padding:14px 0 calc(env(safe-area-inset-bottom) + 14px);
  font-size:11.5px;font-weight:600;
  color:rgba(210,165,93,0.4);
  border-top:1px solid var(--c-border);
  backdrop-filter:blur(12px);
  background:rgba(13,2,8,0.6);
  letter-spacing:0.3px;
}
footer a{
  color:var(--gold-400);font-weight:800;text-decoration:none;
  transition:color var(--t-fast);
}
footer a:hover{color:var(--gold-200);}
footer .hl{color:rgba(210,165,93,0.3);}

/* ============================================================
   SCROLLBAR
   ============================================================ */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(210,165,93,0.2);border-radius:4px;}
</style>
</head>

];

const ANIMS=["lift","pulse","tilt","squeeze","glow","wobble","flip","bounce"];
function build(list,id){
  const box=document.getElementById(id);
  list.forEach((p,i)=>{
    const a=document.createElement("a");
    a.className="tile";
    a.href=p.u;a.target="_blank";a.rel="noopener";
    a.style.animationDelay=(i*0.06)+"s";
    a.dataset.anim=ANIMS[i%ANIMS.length];
    a.innerHTML=`<span class="ic">${p.ic}</span><span class="nm">${p.n}</span>`;
    // Particle burst on click
    a.addEventListener("pointerdown",function(e){
      for(let k=0;k<6;k++){
        const b=document.createElement("div");
        b.className="burst";
        const ang=k*(Math.PI*2/6);
        const dist=30+Math.random()*20;
        b.style.setProperty("--bx",Math.cos(ang)*dist+"px");
        b.style.setProperty("--by",Math.sin(ang)*dist+"px");
        a.appendChild(b);
        setTimeout(()=>b.remove(),600);
      }
      a.classList.add("clicked");
      setTimeout(()=>a.classList.remove("clicked"),600);
    });
    box.appendChild(a);
  });
}
build(psy,"psy");
build(oth,"oth");

// Stats
document.getElementById("psy-count").textContent=psy.length;
document.getElementById("oth-count").textContent=oth.length;
document.getElementById("total-count").textContent=psy.length+oth.length;

// PWA install
let dp=null;
const ib=document.getElementById("install");
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();dp=e;ib.style.display="block";
});
ib.addEventListener("click",async()=>{
  if(!dp)return;
  dp.prompt();
  await dp.userChoice;
  dp=null;ib.style.display="none";
});

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
