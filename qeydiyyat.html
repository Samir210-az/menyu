<!DOCTYPE html><html lang="az"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qeydiyyat — AN Psixoloji</title>
<style>
*{box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
body{margin:0;background:linear-gradient(135deg,#6A0000,#8a2020);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:40px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
h1{color:#6A0000;margin:0 0 8px;font-size:24px}
.sub{color:#777;font-size:13px;margin-bottom:24px}
label{display:block;font-size:13px;color:#555;margin-bottom:6px;margin-top:14px;font-weight:600}
input{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;margin-bottom:0}
button{width:100%;padding:13px;margin-top:20px;border:none;border-radius:10px;background:#6A0000;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
button:hover{background:#8a2020}
.msg{margin-top:12px;font-size:13px;text-align:center;padding:10px;border-radius:8px}
.msg.ok{background:#e8f5e9;color:#27ae60}
.msg.err{background:#fdecea;color:#c0392b}
.login-link{margin-top:16px;text-align:center;font-size:13px;color:#777}
.login-link a{color:#6A0000;text-decoration:none;font-weight:600}
</style></head><body>
<div class="card">
<h1>🔐 Qeydiyyat</h1>
<div class="sub">AN Psixoloji Qiymətləndirmə Alətləri</div>

<label>E-poçt</label>
<input type="email" id="email" placeholder="məsən@merkez.com">

<label>Mərkəzin Adı</label>
<input type="text" id="centerName" placeholder="Məsən Inkişaf Mərkəzi">

<label>Telefon</label>
<input type="tel" id="phone" placeholder="+994 50 XXX XX XX">

<button onclick="register()">Qeydiyyatdan Keç</button>
<div class="msg" id="msg"></div>

<div class="login-link">
Artıq qeydiyyatdan keçmisiniz? <a href="login.html">Daxil olun</a>
</div>
</div>

<script>
function register(){
  const email = document.getElementById('email').value.trim();
  const centerName = document.getElementById('centerName').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const msg = document.getElementById('msg');
  
  if (!email || !centerName || !phone) {
    msg.className = 'msg err';
    msg.textContent = 'Bütün sahələri doldurun';
    return;
  }
  
  if (!email.includes('@')) {
    msg.className = 'msg err';
    msg.textContent = 'Düzgün e-poçt daxil edin';
    return;
  }
  
  let customers = JSON.parse(localStorage.getItem('customers') || '{}');
  
  if (customers[email]) {
    msg.className = 'msg err';
    msg.textContent = 'Bu e-poçt artıq qeydiyyatdan keçib';
    return;
  }
  
  customers[email] = {
    name: centerName,
    phone: phone,
    createdAt: Date.now(),
    approved: false,
    licenses: {
      "aba-terapiya": [],
      "AN": [],
      "goog": [],
      "denever": [],
      "TEST": [],
      "cbt": []
    }
  };
  
  localStorage.setItem('customers', JSON.stringify(customers));
  
  msg.className = 'msg ok';
  msg.textContent = '✓ Qeydiyyat uğurlu! Təsdiqləmə üçün gözləyin...';
  
  setTimeout(() => {
    window.location.href = 'login.html';
  }, 1500);
}

document.getElementById('email').addEventListener('keydown', function(e){
  if (e.key === 'Enter') register();
});
</script>
</body></html>
